<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBRE Attendance System</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:Poppins;
  background:linear-gradient(135deg,#0f172a,#1e293b,#2563eb);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:15px;
}

.card {
  width:100%;
  max-width:420px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  padding:25px;
  border-radius:25px;
  color:white;
  box-shadow:0 20px 50px rgba(0,0,0,0.4);
}

h1 {
  text-align:center;
  margin-bottom:5px;
}

.subtitle {
  text-align:center;
  color:#93c5fd;
  margin-bottom:20px;
}

input, select {
  width:100%;
  padding:14px;
  margin-bottom:12px;
  border:none;
  border-radius:12px;
  outline:none;
  background:rgba(255,255,255,0.1);
  color:white;
}

select option { color:black; }

button {
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}

.in {
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:white;
}

.out {
  background:linear-gradient(135deg,#ef4444,#dc2626);
  color:white;
}

.status {
  margin-top:15px;
  text-align:center;
}
</style>
</head>

<body>

<div class="card">

<h1>CBRE</h1>
<div class="subtitle">Network Attendance System</div>

<input id="name" placeholder="Employee Name">
<input id="id" placeholder="Employee ID">

<select id="team">
  <option value="">Select Team Lead</option>
  <option>Camila</option>
  <option>Ramon</option>
  <option>Brandon</option>
  <option>Damien</option>
</select>

<button class="in" onclick="send('Clock In')">Clock In</button>
<button class="out" onclick="send('Clock Out')">Clock Out</button>

<div class="status" id="status"></div>

</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbys9pEEv0XKgqnjrE8niTu7FYBzWP1819ZkJjIDsZLeJavB-dIyC8l135GaNQTmagw/exec";

function send(action){

  const name = document.getElementById("name").value;
  const id = document.getElementById("id").value;
  const team = document.getElementById("team").value;

  if(!name || !id || !team){
    show("Fill all fields");
    return;
  }

  navigator.geolocation.getCurrentPosition(async(pos)=>{

    const data = {
      employeeName:name,
      employeeId:id,
      teamLead:team,
      action:action,
      latitude:pos.coords.latitude,
      longitude:pos.coords.longitude,
      address:pos.coords.latitude + "," + pos.coords.longitude,
      device:navigator.userAgent
    };

    await fetch(SCRIPT_URL,{
      method:"POST",
      mode:"no-cors",
      body:JSON.stringify(data)
    });

    show(action + " Successful");

    document.getElementById("name").value="";
    document.getElementById("id").value="";
    document.getElementById("team").value="";

  },()=>show("GPS permission denied"));
}

function show(msg){
  document.getElementById("status").innerText = msg;
}

</script>

</body>
</html>
