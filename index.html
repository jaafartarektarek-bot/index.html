  <div class="button-grid">
    <button class="clockin" onclick="submitAttendance('Clock In')">
      Clock In
    </button>

    <button class="clockout" onclick="submitAttendance('Clock Out')">
      Clock Out
    </button>
  </div>

  <button class="admin-btn">
    Admin Dashboard
  </button>

  <div id="status" class="status"></div>

  <div class="footer">
    CBRE Network Department © 2026
  </div>

</div>

<script>

const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyR6upD1LuPZus9jI9OGtPNEmvojjbPZGGcAEoQNdL_ZLCn8D4Y39j1khCEovSo_Ryq/exec';

async function submitAttendance(action){

  const employeeName = document.getElementById('employeeName').value;
  const employeeId = document.getElementById('employeeId').value;
  const teamLead = document.getElementById('teamLead').value;

  if(!employeeName || !employeeId || !teamLead){
    showMessage('Please complete all fields','error');
    return;
  }

  navigator.geolocation.getCurrentPosition(async(position)=>{

    const payload = {
      employeeName,
      employeeId,
      teamLead,
      action,
      latitude:position.coords.latitude,
      longitude:position.coords.longitude,
      address:`${position.coords.latitude}, ${position.coords.longitude}`,
      device:navigator.userAgent
    };

    try{

      const response = await fetch(SCRIPT_URL,{
        method:'POST',
        body:JSON.stringify(payload)
      });

      const result = await response.json();

      if(result.result === 'success'){
        showMessage(`${action} Successful`,'success');
      }else{
        showMessage('Submission Failed','error');
      }

    }catch(error){
      showMessage('Connection Error','error');
    }
</html>
